
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mileage Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Mileage Tracker</h2>

    <label for="distance">Distance Travelled (km)</label>
    <input type="number" id="distance" placeholder="Enter distance">

    <label for="fuel">Fuel Used (litres)</label>
    <input type="number" id="fuel" placeholder="Enter fuel used">

    <button onclick="calculateMileage()">Calculate Mileage</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculateMileage() {
      let distance = parseFloat(document.getElementById("distance").value);
      let fuel = parseFloat(document.getElementById("fuel").value);

      if (distance > 0 && fuel > 0) {
        let mileage = distance / fuel;

        document.getElementById("result").innerHTML =
          "Mileage: " + mileage.toFixed(2) + " km/l";
      } else {
        document.getElementById("result").innerHTML =
          "Please enter valid values.";
      }
    }
  </script>

</body>
</html>
